<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="index.css" rel="stylesheet">
</head>

<body>
    <div id="calculator">
        <input type="text" id="result" value="">
        <div id="buttons">
            <button class="btn" id="btn-1" value="AC">AC</button>
            <button class="btn" id="btn-2" value="DEL">DEL</button>
            <button class="btn" id="btn-3" value="%">%</button>
            <button class="btn" id="btn-4" value="/">/</button>
            <button class="btn" id="btn-5" value="7">7</button>
            <button class="btn" id="btn-6" value="8">8</button>
            <button class="btn" id="btn-7" value="9">9</button>
            <button class="btn" id="btn-8" value="*">*</button>
            <button class="btn" id="btn-9" value="4">4</button>
            <button class="btn" id="btn-10" value="5">5</button>
            <button class="btn" id="btn-11" value="6">6</button>
            <button class="btn" id="btn-12" value="-">-</button>
            <button class="btn" id="btn-13" value="1">1</button>
            <button class="btn" id="btn-14" value="2">2</button>
            <button class="btn" id="btn-15" value="3">3</button>
            <button class="btn" id="btn-16" value="+">+</button>
            <button class="btn" id="btn-17" value="0">0</button>
            <button class="btn" id="btn-18" value="00">00</button>
            <button class="btn" id="btn-19" value=".">.</button>
            <button class="btn" id="btn-20" value="=">=</button>

        </div>

    </div>
    <script src="code.js"></script>
</body>

</html>
